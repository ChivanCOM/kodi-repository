name: Update Kodi Repository

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build C++ visualizer (macOS)
        run: bash visualization.ibroadcast.albumart/build.sh

      - name: Build C++ visualizer (Android arm64-v8a)
        continue-on-error: true
        run: |
          NDK="${ANDROID_NDK_ROOT:-$ANDROID_NDK_HOME}"
          ADDON=visualization.ibroadcast.albumart
          cmake -S "$ADDON" -B "$ADDON/build_android" \
                -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-21 \
                -DCMAKE_BUILD_TYPE=Release \
                -DKODI_INCLUDE_DIR=/tmp/xbmc-omega/xbmc/addons/kodi-dev-kit/include
          cmake --build "$ADDON/build_android"
          cp "$ADDON/build_android/$ADDON.so" "$ADDON/"

      - name: Build addon zips and generate addons.xml
        run: python3 .github/scripts/build_repo.py

      - name: Commit and push updated repo files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update repository [skip ci]"
          git push

      - name: Deploy repository installer to kodi-repository-install
        env:
          INSTALL_REPO_TOKEN: ${{ secrets.INSTALL_REPO_TOKEN }}
        run: |
          [ -z "$INSTALL_REPO_TOKEN" ] && echo "INSTALL_REPO_TOKEN not set, skipping." && exit 0
          ZIP=$(ls zips/plugin.repository.ibroadcast/*.zip 2>/dev/null | head -1)
          [ -z "$ZIP" ] && echo "No installer zip found, skipping." && exit 0
          ZIP_NAME=$(basename "$ZIP")

          git clone "https://x-access-token:${INSTALL_REPO_TOKEN}@github.com/ChivanCOM/kodi-repository-install.git" /tmp/kodi-repo-install

          cp "$ZIP" /tmp/kodi-repo-install/
          cp zips/plugin.repository.ibroadcast/icon.png /tmp/kodi-repo-install/ 2>/dev/null || true

          cat > /tmp/kodi-repo-install/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head><title>iBroadcast Kodi Repository</title></head>
          <body>
          <h1>iBroadcast Kodi Repository Installer</h1>
          <p>Download and install this zip in Kodi via <b>Add-ons → Install from zip file</b>:</p>
          <p><a href="${ZIP_NAME}">${ZIP_NAME}</a></p>
          <p>Once installed, the iBroadcast plugin and visualizer are available via the repository.</p>
          </body>
          </html>
          EOF

          cd /tmp/kodi-repo-install
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update repository installer [skip ci]"
          git push
