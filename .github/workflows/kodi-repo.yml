name: Update Kodi Repository

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build addon zips and generate addons.xml
        run: python3 .github/scripts/build_repo.py

      - name: Commit and push updated repo files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addons.xml addons.xml.md5
          git add '*/plugin.*.zip' 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update repository [skip ci]"
          git push
